services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  agent-api:
    build:
      context: ./agent
      dockerfile: Dockerfile
      args:
        AGENT_VERSION: ${AGENT_VERSION:-dev}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent
    ports:
      - "8000:8000"
    volumes:
      - ./data/published/duckdb:/app/data/published/duckdb:ro
      - ./artifacts:/app/artifacts
    tmpfs:
      - /tmp/duckdb
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Demo Day frontend (008-agent-frontend-v1). Vite dev-server inside the
  # container per specs/008-agent-frontend-v1/research.md §R1. Talks to
  # agent-api over the host's localhost:8000 (browser-side fetch from
  # the user's machine). No `volumes:` mount of ./data or ./artifacts —
  # the frontend physically cannot read those paths (FR-020).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      agent-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
